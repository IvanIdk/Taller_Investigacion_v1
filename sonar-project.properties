sonar.projectKey=sistema-prediccion-uc
sonar.projectName=Sistema Prediccion UC
sonar.projectVersion=1.0

sonar.sources=frontend,backend
sonar.exclusions=**/node_modules/**,**/.next/**,**/out/**,**/build/**,**/*.min.js,**/package-lock.json,**/public/**,backend/models/**,backend/venv/**,**/__pycache__/**,supabase/**

sonar.tests=frontend,backend/tests
sonar.test.inclusions=**/*.test.ts,**/*.test.tsx,**/*.spec.ts,**/*.spec.tsx,**/test_*.py

# TypeScript / JavaScript (Next.js)
sonar.typescript.lcov.reportPaths=frontend/coverage/lcov.info
sonar.javascript.lcov.reportPaths=frontend/coverage/lcov.info

# Python (FastAPI)
sonar.python.version=3.11
sonar.python.coverage.reportPaths=backend/coverage.xml

# Quality gate helpers
sonar.coverage.exclusions=**/mock/**,**/*.config.*,**/next-env.d.ts
