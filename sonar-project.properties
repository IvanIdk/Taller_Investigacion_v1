sonar.projectKey=sistema-prediccion-uc
sonar.projectName=Sistema Prediccion UC
sonar.projectVersion=1.1

# Fuentes analizadas
sonar.sources=frontend,backend
sonar.exclusions=**/node_modules/**,**/.next/**,**/out/**,**/build/**,**/*.min.js,**/package-lock.json,**/public/**,backend/models/**,backend/venv/**,**/__pycache__/**,supabase/**,mocks/**,Estadado_de_Arte/**,planificacion/**,diseno/**,docs/**

# Pruebas automatizadas (ISO 29119)
sonar.tests=frontend,backend/tests
sonar.test.inclusions=**/*.test.ts,**/*.test.tsx,**/*.spec.ts,**/*.spec.tsx,**/test_*.py
sonar.test.exclusions=**/node_modules/**,**/.next/**

# TypeScript / JavaScript (Next.js) — generado por: npm run test:coverage
sonar.typescript.lcov.reportPaths=frontend/coverage/lcov.info
sonar.javascript.lcov.reportPaths=frontend/coverage/lcov.info

# Python (FastAPI) — generado por: pytest --cov-report=xml:coverage.xml
sonar.python.version=3.11
sonar.python.coverage.reportPaths=backend/coverage.xml

# Excluir de métrica de cobertura (infra, tipos, hooks sin lógica crítica)
sonar.coverage.exclusions=**/mocks/**,**/*.config.*,**/next-env.d.ts,frontend/lib/supabase.ts,frontend/lib/auth.ts,frontend/lib/hooks/**,frontend/lib/types/**,frontend/lib/api/demoFetch.ts,frontend/app/**,frontend/components/**,backend/tests/**

# Duplicación — páginas Next.js repetitivas fuera del núcleo lib/backend
sonar.cpd.exclusions=frontend/app/**,frontend/components/**,mocks/**
