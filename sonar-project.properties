sonar.projectKey=Ivanldk_Taller_Investigacion_v1
sonar.projectName=Taller Investigacion v1
sonar.organization=ivanldk
sonar.projectVersion=1.2

# Fuentes analizadas
sonar.sources=frontend,backend
sonar.exclusions=**/node_modules/**,**/.next/**,**/out/**,**/build/**,**/*.min.js,**/package-lock.json,**/public/**,backend/models/**,backend/venv/**,**/__pycache__/**,supabase/**,mocks/**,Estadado_de_Arte/**,planificacion/**,diseno/**,docs/**,frontend/coverage/**

# Pruebas automatizadas (ISO 29119)
sonar.tests=frontend,backend/tests
sonar.test.inclusions=**/*.test.ts,**/*.test.tsx,**/*.spec.ts,**/*.spec.tsx,**/test_*.py
sonar.test.exclusions=**/node_modules/**,**/.next/**,**/coverage/**

# Cobertura: ejecutar scripts/fix-sonar-coverage.mjs tras generar reportes (CI lo hace automáticamente)
sonar.typescript.lcov.reportPaths=frontend/coverage/lcov.info
sonar.javascript.lcov.reportPaths=frontend/coverage/lcov.info

# Python — generado por: pytest --cov-report=xml:coverage.xml
sonar.python.version=3.11
sonar.python.coverage.reportPaths=backend/coverage.xml

sonar.coverage.exclusions=**/mocks/**,**/*.config.*,**/next-env.d.ts,frontend/lib/supabase.ts,frontend/lib/auth.ts,frontend/lib/hooks/**,frontend/lib/types/**,frontend/lib/api/demoFetch.ts,frontend/app/**,frontend/components/**,backend/tests/**

sonar.cpd.exclusions=frontend/app/**,frontend/components/**,mocks/**
