name: SonarQube Analysis

on:
  push:
    branches: [main, master, develop]
  pull_request:
    branches: [main, master, develop]
  workflow_dispatch:

jobs:
  sonar:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Lint frontend
        working-directory: frontend
        run: npm run lint

      - name: Frontend unit & stress tests with coverage
        working-directory: frontend
        run: npm run test:coverage

      - name: Setup Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5.6.0
        with:
          python-version: "3.11"

      - name: Install backend dependencies
        working-directory: backend
        run: pip install -r requirements-dev.txt

      - name: Ruff check (Python)
        working-directory: backend
        run: ruff check .

      - name: Backend unit, integration & stress tests with coverage
        working-directory: backend
        run: pytest --cov=. --cov-report=xml:coverage.xml --cov-report=term-missing

      - name: Verify coverage reports exist
        run: |
          test -f frontend/coverage/lcov.info || (echo "Missing frontend/coverage/lcov.info" && exit 1)
          test -f backend/coverage.xml || (echo "Missing backend/coverage.xml" && exit 1)

      - name: Fix coverage paths for SonarCloud monorepo
        run: node scripts/fix-sonar-coverage.mjs

      - name: SonarCloud Scan
        uses: SonarSource/sonarcloud-github-action@02ef91109b2d589e757aefcfb2854c2783fd7b19 # v4.0.0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        with:
          args: >
            -Dsonar.organization=${{ vars.SONAR_ORGANIZATION || 'ivanldk' }}
            -Dsonar.projectKey=${{ vars.SONAR_PROJECT_KEY || 'Ivanldk_Taller_Investigacion_v1' }}
            -Dsonar.javascript.lcov.reportPaths=frontend/coverage/lcov.info
            -Dsonar.typescript.lcov.reportPaths=frontend/coverage/lcov.info
            -Dsonar.python.coverage.reportPaths=backend/coverage.xml
