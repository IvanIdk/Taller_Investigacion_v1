name: SonarQube Analysis

on:
  push:
    branches: [main, master, develop]
  pull_request:
    branches: [main, master, develop]

jobs:
  sonar:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Lint frontend
        working-directory: frontend
        run: npm run lint

      - name: Frontend unit & stress tests with coverage
        working-directory: frontend
        run: npm run test:coverage

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install backend dependencies
        working-directory: backend
        run: pip install -r requirements-dev.txt

      - name: Ruff check (Python)
        working-directory: backend
        run: ruff check .

      - name: Backend unit, integration & stress tests with coverage
        working-directory: backend
        run: pytest --cov=. --cov-report=xml:coverage.xml --cov-report=term-missing

      - name: SonarCloud Scan
        uses: SonarSource/sonarcloud-github-action@master
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        with:
          args: >
            -Dsonar.organization=${{ vars.SONAR_ORGANIZATION || 'ivanldk' }}
            -Dsonar.projectKey=${{ vars.SONAR_PROJECT_KEY || 'Ivanldk_Taller_Investigacion_v1' }}
